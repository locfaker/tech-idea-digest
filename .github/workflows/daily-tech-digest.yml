name: Daily Technology Ideas Digest

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send email after generating the digest"
        required: true
        type: boolean
        default: false
      max_items:
        description: "Maximum ranked items"
        required: true
        type: string
        default: "20"

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Generate digest preview
        shell: bash
        run: |
          MAX_ITEMS="${{ github.event.inputs.max_items || '20' }}"
          python -m tech_idea_digest --dry-run --max-items "$MAX_ITEMS" | tee digest.txt
          {
            echo "## Tech Idea Digest Preview"
            echo
            echo '```text'
            cat digest.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest preview
        uses: actions/upload-artifact@v4
        with:
          name: tech-idea-digest-preview
          path: digest.txt

      - name: Send digest email
        if: github.event_name == 'schedule' || github.event.inputs.send_email == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          SMTP_USE_TLS: ${{ secrets.SMTP_USE_TLS }}
        shell: bash
        run: |
          MAX_ITEMS="${{ github.event.inputs.max_items || '20' }}"
          python -m tech_idea_digest --send-email --max-items "$MAX_ITEMS"
